name: opc_app
description: OPC 人员社交、管理、运营、交易平台
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # 网络
  dio: ^5.7.0
  # 路由
  go_router: ^14.6.2
  # 本地存储
  flutter_secure_storage: ^9.2.4
  # WebSocket
  web_socket_channel: ^3.0.1
  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  # 工具
  intl: ^0.19.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  freezed: ^2.5.7
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
