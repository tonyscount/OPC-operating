version: "3.8"

# 开发环境覆盖 —— 只启动基础设施，API 在本地跑方便调试
services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: opc-postgres-dev
    environment:
      POSTGRES_DB: opc_platform
      POSTGRES_USER: opc_user
      POSTGRES_PASSWORD: opc_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/alembic/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opc_user -d opc_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opc-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
