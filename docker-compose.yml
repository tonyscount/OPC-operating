version: "3.8"

# ============================================================
# OPC Platform — 生产部署 (一键启动)
#
# 启动:  docker compose up -d
# 查看:  docker compose ps
# 停止:  docker compose down
# 日志:  docker compose logs -f api
#
# 前置: 复制 .env.example 为 .env 并填写必要配置
# ============================================================

services:
  # ========== PostgreSQL 15 + pgvector ==========
  postgres:
    image: pgvector/pgvector:pg15
    container_name: opc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opc_platform}
      POSTGRES_USER: ${POSTGRES_USER:-opc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opc_dev_password}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/alembic/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opc_user} -d ${POSTGRES_DB:-opc_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    container_name: opc-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ========== FastAPI 后端 ==========
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opc-api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/auth/login', data=b'{}')\" || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # ========== Celery Worker (异步任务) ==========
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opc-worker
    restart: unless-stopped
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ========== Celery Beat (定时任务调度) ==========
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opc-beat
    restart: unless-stopped
    command: celery -A worker.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # ========== Web 前端 ==========
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: opc-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M

  # ========== Nginx 总入口 (反向代理) ==========
  nginx:
    image: nginx:alpine
    container_name: opc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && wget -q --spider http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  redis_data:
